name: docs-ci

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.github/workflows/docs-ci.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.github/workflows/docs-ci.yml'

concurrency:
  group: docs-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Lint markdown
        run: markdownlint-cli2 "README.md" "docs/**/*.md" "game/README.md"

      - name: Check local markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --include-fragments
            --fail-if-empty=false
            README.md
            docs/**/*.md
            game/README.md
          fail: true
