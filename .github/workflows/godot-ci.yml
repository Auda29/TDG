name: godot-ci

on:
  push:
    branches: [main, master]
    paths:
      - 'game/**'
      - '.github/workflows/godot-ci.yml'
  pull_request:
    paths:
      - 'game/**'
      - '.github/workflows/godot-ci.yml'

concurrency:
  group: godot-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Download Godot 4.4
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.4-stable/Godot_v4.4-stable_linux.x86_64.zip
          unzip -q Godot_v4.4-stable_linux.x86_64.zip -d godot-bin
          chmod +x godot-bin/Godot_v4.4-stable_linux.x86_64

      - name: Headless project smoke check
        run: |
          ./godot-bin/Godot_v4.4-stable_linux.x86_64 --headless --path game --quit
